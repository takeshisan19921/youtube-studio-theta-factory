name: Build Theta PyTorch SSH Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GHCR tag to publish
        required: true
        default: theta-torch212-cu126
  push:
    branches:
      - main
    paths:
      - theta-pytorch-ssh/**
      - .github/workflows/build-theta-pytorch-ssh.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/youtube-studio-theta-factory

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz" -o source.tar.gz
          tar -xzf source.tar.gz --strip-components=1
          test -f theta-pytorch-ssh/Dockerfile
          test -f theta-pytorch-ssh/entrypoint.sh

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          TAG="${{ github.event.inputs.tag || 'theta-torch212-cu126' }}"
          docker buildx version
          docker buildx create --name theta-builder --use || docker buildx use theta-builder
          docker buildx inspect --bootstrap
          docker buildx build             --platform linux/amd64             --push             --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}"             --label "org.opencontainers.image.description=Theta EdgeCloud PyTorch CUDA SSH image. No secrets or generated media."             -t "${IMAGE_NAME}:${TAG}"             -f theta-pytorch-ssh/Dockerfile             theta-pytorch-ssh
